<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC服务器在线监控 - 末影阁 EnderNest</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* 背景图片 */
            background: url('https://mc.l-w.top/bg.jpg') center center / cover no-repeat fixed;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        
        /* 背景遮罩层 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            /* 毛玻璃效果 */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1em;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        
        .server-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .info-card {
            /* 毛玻璃效果 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 35px;
            border-radius: 15px;
            text-align: center;
            min-width: 150px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s;
        }
        
        .info-card:hover {
            transform: translateY(-5px);
        }
        
        .info-card h3 {
            font-size: 0.9em;
            opacity: 0.85;
            margin-bottom: 8px;
        }
        
        .info-card .value {
            font-size: 2.2em;
            font-weight: bold;
            color: #00d9ff;
        }
        
        .chart-container {
            /* 毛玻璃效果 - 主要修改 */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        #mainChart {
            width: 100%;
            height: 500px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        button {
            /* 毛玻璃按钮 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        button:hover, button.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            transform: translateY(-2px);
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
        }
        
        .error {
            /* 错误提示框 - 也使用毛玻璃 */
            background: rgba(255, 100, 100, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(255, 100, 100, 0.3);
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            /* 毛玻璃效果 */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0.9;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            #mainChart { height: 350px; }
            .info-card { min-width: 120px; padding: 15px 20px; }
            .info-card .value { font-size: 1.5em; }
            .chart-container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>末影阁服务器在线监控</h1>
        </header>
        
        <div class="chart-container">
            <div class="controls">
                <button class="active" onclick="setRange(1)">24小时</button>
                <button onclick="setRange(2)">2天</button>
                <button onclick="setRange(3)">3天</button>
                <button onclick="refreshData()">🔄 刷新</button>
            </div>
            <div id="mainChart"></div>
        </div>
        
        <footer>
            <p>数据每20分钟自动更新 | 最后更新: <span id="lastUpdate">-</span></p>
            <p>服务器地址: <strong>mc.l-w.top</strong></p>
        </footer>
    </div>

    <script>
        let chart;
        let allData = [];
        let currentRange = 3; // 默认显示3天
        
        // 初始化图表
        function initChart() {
            chart = echarts.init(document.getElementById('mainChart'));
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    borderColor: '#00d9ff',
                    textStyle: { color: '#fff' },
                    formatter: function(params) {
                        const data = params[0];
                        const date = new Date(data.value[0]);
                        return `<strong>${date.toLocaleString('zh-CN')}</strong><br/>` +
                               `在线人数: ${data.value[1]}`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'time',
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.8)' } },
                    axisLabel: { 
                        color: 'rgba(255,255,255,0.9)',
                        formatter: function(value) {
                            const date = new Date(value);
                            return `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}`;
                        }
                    },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                yAxis: {
                    type: 'value',
                    name: '在线人数',
                    axisLine: { show: false },
                    axisLabel: { color: 'rgba(255,255,255,0.9)' },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                series: [{
                    name: '在线人数',
                    type: 'line',
                    smooth: true,
                    symbol: 'none',
                    lineStyle: {
                        color: '#00d9ff',
                        width: 3
                    },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(0,217,255,0.5)' },
                            { offset: 1, color: 'rgba(0,217,255,0.0)' }
                        ])
                    },
                    data: []
                }]
            };
            
            chart.setOption(option);
        }
        
        // 加载数据
        async function loadData() {
            try {
                const cacheBuster = `?t=${Date.now()}`;
                const dataUrl = 'data.json' + cacheBuster;
                
                console.log('正在加载数据:', dataUrl);
                
                const response = await fetch(dataUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP 错误: ${response.status} ${response.statusText}`);
                }
                
                allData = await response.json();
                console.log('数据加载成功:', allData);
                
                if (allData.length === 0) {
                    console.warn('数据数组为空');
                    document.getElementById('mainChart').innerHTML = 
                        '<div class="error">暂无数据，等待数据采集...</div>';
                    return;
                }
                
                updateDisplay();
                updateChart();
                
                document.getElementById('lastUpdate').textContent = 
                    new Date().toLocaleString('zh-CN');
                    
            } catch (error) {
                console.error('加载数据失败:', error);
                
                let errorMessage = error.message;
                if (error.name === 'SyntaxError') {
                    errorMessage = 'JSON 格式错误';
                } else if (error.message.includes('404')) {
                    errorMessage = '数据文件不存在 (data.json)';
                }
                
                document.getElementById('mainChart').innerHTML = 
                    `<div class="error">
                        数据加载失败，请稍后重试<br>
                        <small>错误: ${errorMessage}</small><br>
                        <small>时间: ${new Date().toLocaleString('zh-CN')}</small>
                    </div>`;
            }
        }
        
        // 更新显示信息
        function updateDisplay() {
            if (allData.length === 0) return;
            
            const latest = allData[allData.length - 1];
            const maxOnline = Math.max(...allData.map(d => d.online));
            
            document.getElementById('currentOnline').textContent = latest.online;
            document.getElementById('maxOnline').textContent = maxOnline;
            document.getElementById('dataPoints').textContent = allData.length;
            
            // 更新服务器状态
            const statusEl = document.getElementById('serverStatus');
            if (latest.is_online) {
                statusEl.textContent = '在线';
                statusEl.style.color = '#22c55e';
            } else {
                statusEl.textContent = '离线';
                statusEl.style.color = '#ef4444';
            }
        }
        
        // 更新图表
        function updateChart() {
            if (allData.length === 0) return;
            
            const now = new Date();
            const startTime = new Date(now.getTime() - currentRange * 24 * 60 * 60 * 1000);
            
            const filteredData = allData.filter(d => new Date(d.time) >= startTime);
            
            const chartData = filteredData.map(d => ({
                value: [new Date(d.time), d.online]
            }));
            
            chart.setOption({
                series: [{ data: chartData }],
                xAxis: {
                    min: startTime,
                    max: now
                }
            });
        }
        
        // 设置时间范围
        function setRange(days) {
            currentRange = days;
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            updateChart();
        }
        
        // 刷新数据
        function refreshData() {
            loadData();
        }
        
        // 窗口大小改变时重绘
        window.addEventListener('resize', () => {
            chart.resize();
        });
        
        // 初始化
        initChart();
        loadData();
        
        // 每5分钟自动刷新
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
