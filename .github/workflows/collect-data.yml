name: Collect MC Server Data

on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟执行一次
  workflow_dispatch:       # 允许手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Fetch Server Data
        run: |
          python3 << 'EOF'
          import json
          import urllib.request
          import urllib.error
          import os
          import time
          from datetime import datetime
          
          # API 地址
          api_url = 'https://list.mczfw.com/api/mc.l-w.top'
          
          # 添加请求头（模拟浏览器）
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
              'Accept-Encoding': 'gzip, deflate',
              'Connection': 'keep-alive'
          }
          
          max_retries = 3
          retry_delay = 5  # 秒
          
          for attempt in range(max_retries):
              try:
                  print(f"尝试连接 API (第 {attempt + 1}/{max_retries} 次)...")
                  
                  # 创建请求
                  req = urllib.request.Request(api_url, headers=headers)
                  
                  # 发送请求
                  with urllib.request.urlopen(req, timeout=15) as response:
                      data = json.loads(response.read().decode('utf-8'))
                  
                  # 提取数据
                  online = int(data.get('p', 0))
                  max_online = int(data.get('mp', 0))
                  ping = int(data.get('ping', 0))
                  time_now = datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
                  
                  # 创建新数据条目
                  new_entry = {
                      "time": time_now,
                      "online": online,
                      "max": max_online,
                      "ping": ping
                  }
                  
                  # 读取现有数据
                  data_file = 'data.json'
                  if os.path.exists(data_file):
                      with open(data_file, 'r', encoding='utf-8') as f:
                          all_data = json.load(f)
                  else:
                      all_data = []
                  
                  # 添加新数据
                  all_data.append(new_entry)
                  
                  # 保留最近3天的数据（约864条，每5分钟一条）
                  if len(all_data) > 864:
                      all_data = all_data[-864:]
                  
                  # 保存数据
                  with open(data_file, 'w', encoding='utf-8') as f:
                      json.dump(all_data, f, indent=2, ensure_ascii=False)
                  
                  print(f"✅ 数据采集成功！")
                  print(f"   时间: {time_now}")
                  print(f"   在线: {online}")
                  print(f"   最大: {max_online}")
                  print(f"   延迟: {ping}ms")
                  print(f"   总数据点: {len(all_data)}")
                  
                  # 成功，跳出循环
                  break
                  
              except urllib.error.HTTPError as e:
                  print(f"⚠️  HTTP 错误 {e.code}: {e.reason}")
                  if attempt < max_retries - 1:
                      print(f"   等待 {retry_delay} 秒后重试...")
                      time.sleep(retry_delay)
                  else:
                      print("❌ 多次重试失败，使用默认数据")
                      # 创建默认数据
                      new_entry = {
                          "time": datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
                          "online": 0,
                          "max": 0,
                          "ping": 0
                      }
                      # 如果文件不存在，创建空数组
                      if not os.path.exists('data.json'):
                          all_data = []
                      else:
                          with open('data.json', 'r', encoding='utf-8') as f:
                              all_data = json.load(f)
                      all_data.append(new_entry)
                      if len(all_data) > 864:
                          all_data = all_data[-864:]
                      with open('data.json', 'w', encoding='utf-8') as f:
                          json.dump(all_data, f, indent=2, ensure_ascii=False)
                      # 不抛出错误，继续执行
                      
              except Exception as e:
                  print(f"⚠️  错误: {e}")
                  if attempt < max_retries - 1:
                      print(f"   等待 {retry_delay} 秒后重试...")
                      time.sleep(retry_delay)
                  else:
                      print("❌ 多次重试失败，使用默认数据")
                      if not os.path.exists('data.json'):
                          all_data = []
                      else:
                          with open('data.json', 'r', encoding='utf-8') as f:
                              all_data = json.load(f)
                      all_data.append({
                          "time": datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
                          "online": 0,
                          "max": 0,
                          "ping": 0
                      })
                      if len(all_data) > 864:
                          all_data = all_data[-864:]
                      with open('data.json', 'w', encoding='utf-8') as f:
                          json.dump(all_data, f, indent=2, ensure_ascii=False)
          EOF
          
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git diff --staged --quiet || git commit -m "📊 Update server data at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
