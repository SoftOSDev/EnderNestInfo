name: Collect MC Server Data

on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟执行一次
  workflow_dispatch:       # 允许手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Fetch Server Data
        run: |
          python3 << 'EOF'
          import json
          import urllib.request
          import urllib.error
          import gzip
          import os
          import time
          from datetime import datetime, timezone
          
          # 新的 API 地址
          api_url = 'https://api.mcsrvstat.us/2/mc.l-w.top'
          
          # 请求头
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
              'Accept-Encoding': 'gzip, deflate',
              'Connection': 'keep-alive'
          }
          
          max_retries = 3
          retry_delay = 5
          
          for attempt in range(max_retries):
              try:
                  print(f"尝试连接 API (第 {attempt + 1}/{max_retries} 次)...")
                  
                  req = urllib.request.Request(api_url, headers=headers)
                  
                  with urllib.request.urlopen(req, timeout=15) as response:
                      raw_data = response.read()
                      
                      # 解压 gzip
                      if response.headers.get('Content-Encoding') == 'gzip':
                          print("   检测到 gzip 压缩，正在解压...")
                          raw_data = gzip.decompress(raw_data)
                      
                      data = json.loads(raw_data.decode('utf-8'))
                  
                  # 检查服务器是否在线
                  is_online = data.get('online', False)
                  
                  if is_online:
                      # 从新的 API 结构提取数据
                      online = data.get('players', {}).get('online', 0)
                      max_online = data.get('players', {}).get('max', 0)
                      version = data.get('version', 'Unknown')
                      hostname = data.get('hostname', 'mc.l-w.top')
                      
                      print(f"✅ 服务器在线！")
                      print(f"   版本: {version}")
                      print(f"   地址: {hostname}")
                  else:
                      online = 0
                      max_online = 0
                      version = 'Offline'
                      hostname = 'mc.l-w.top'
                      print("⚠️  服务器离线")
                  
                  time_now = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
                  
                  # 创建新数据条目
                  new_entry = {
                      "time": time_now,
                      "online": online,
                      "max": max_online,
                      "is_online": is_online,
                      "version": version,
                      "hostname": hostname
                  }
                  
                  # 读取现有数据
                  data_file = 'data.json'
                  if os.path.exists(data_file):
                      with open(data_file, 'r', encoding='utf-8') as f:
                          all_data = json.load(f)
                  else:
                      all_data = []
                  
                  # 添加新数据
                  all_data.append(new_entry)
                  
                  # 保留最近3天的数据（约864条）
                  if len(all_data) > 864:
                      all_data = all_data[-864:]
                  
                  # 保存数据
                  with open(data_file, 'w', encoding='utf-8') as f:
                      json.dump(all_data, f, indent=2, ensure_ascii=False)
                  
                  print(f"✅ 数据采集成功！")
                  print(f"   时间: {time_now}")
                  print(f"   在线: {online}")
                  print(f"   最大: {max_online}")
                  print(f"   总数据点: {len(all_data)}")
                  
                  break
                  
              except urllib.error.HTTPError as e:
                  print(f"⚠️  HTTP 错误 {e.code}: {e.reason}")
                  if attempt < max_retries - 1:
                      print(f"   等待 {retry_delay} 秒后重试...")
                      time.sleep(retry_delay)
                  else:
                      print("❌ 多次重试失败，使用默认数据")
                      if not os.path.exists('data.json'):
                          all_data = []
                      else:
                          with open('data.json', 'r', encoding='utf-8') as f:
                              all_data = json.load(f)
                      all_data.append({
                          "time": datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
                          "online": 0,
                          "max": 0,
                          "is_online": False,
                          "version": "Unknown",
                          "hostname": "mc.l-w.top"
                      })
                      if len(all_data) > 864:
                          all_data = all_data[-864:]
                      with open('data.json', 'w', encoding='utf-8') as f:
                          json.dump(all_data, f, indent=2, ensure_ascii=False)
                      
              except Exception as e:
                  print(f"⚠️  错误: {e}")
                  if attempt < max_retries - 1:
                      print(f"   等待 {retry_delay} 秒后重试...")
                      time.sleep(retry_delay)
                  else:
                      print("❌ 多次重试失败，使用默认数据")
                      if not os.path.exists('data.json'):
                          all_data = []
                      else:
                          with open('data.json', 'r', encoding='utf-8') as f:
                              all_data = json.load(f)
                      all_data.append({
                          "time": datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
                          "online": 0,
                          "max": 0,
                          "is_online": False,
                          "version": "Unknown",
                          "hostname": "mc.l-w.top"
                      })
                      if len(all_data) > 864:
                          all_data = all_data[-864:]
                      with open('data.json', 'w', encoding='utf-8') as f:
                          json.dump(all_data, f, indent=2, ensure_ascii=False)
          EOF
          
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git diff --staged --quiet || git commit -m "📊 Update server data at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
